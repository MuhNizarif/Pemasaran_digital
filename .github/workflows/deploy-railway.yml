name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build assets
        run: |
          npm run build

      - name: Install Railway CLI
        run: |
          # Prefer official Railway installer; fallback to npm global install with unsafe-perm
          if command -v railway >/dev/null 2>&1; then
            echo "railway already installed"
          else
            curl -sL https://railway.app/install.sh | sh || npm install -g @railway/cli --unsafe-perm
          fi

      - name: Login to Railway
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          railway login --apiKey "$RAILWAY_API_KEY"

      - name: Deploy to Railway
        env:
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          # If you provide PROJECT and SERVICE IDs as secrets, use them.
          # Otherwise `railway up` will try to deploy to the linked project.
          if [ -n "$RAILWAY_PROJECT_ID" ] && [ -n "$RAILWAY_SERVICE_ID" ]; then
            railway up --project "$RAILWAY_PROJECT_ID" --service "$RAILWAY_SERVICE_ID" --detach || railway deploy --project "$RAILWAY_PROJECT_ID" --service "$RAILWAY_SERVICE_ID"
          else
            railway up --detach || railway deploy
          fi

      - name: Show service URL
        run: |
          railway status || true

# Notes:
# - Add `RAILWAY_API_KEY` to GitHub repo secrets (Settings → Secrets → Actions).
# - Optionally add `RAILWAY_PROJECT_ID` and `RAILWAY_SERVICE_ID` to target a specific service.
# - This workflow builds frontend assets before invoking Railway CLI which will use the repository (and Dockerfile) to build the production image.
